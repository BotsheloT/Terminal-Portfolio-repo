<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BT Dev — Portfolio Terminal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="terminal-root">

  <!-- Banner -->
  <div class="banner-area">
    <div class="banner-area__row">
      <pre class="banner-area__mac"  id="banner-mac"></pre>
      <pre class="banner-area__btdev" id="banner-btdev"></pre>
    </div>
    <p class="banner-area__welcome">Welcome to my interactive web terminal.</p>
    <p class="banner-area__hint">
      For a list of available commands, type <span class="glow-cmd">'help'</span>.
    </p>
  </div>

  <!-- Output + inline input -->
  <div class="output-area" id="output">
    <div class="input-inline" id="input-line">
      <span class="prompt-label">
        visitor@btdev.com<span class="prompt-label__sep">:~$</span>
      </span>
      <div class="fake-input">
        <span class="fake-input__text"  id="typed-text"></span>
        <span class="fake-input__caret" id="caret"></span>
      </div>
      <input id="hidden-input" type="text" autocomplete="off" spellcheck="false" autofocus />
    </div>
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
